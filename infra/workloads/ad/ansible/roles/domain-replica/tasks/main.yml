---
- name: Install Active Directory Domain Services feature
  ansible.windows.win_feature:
    name:
      - AD-Domain-Services
    include_management_tools: true
    state: present

- name: Promote the replica as an additional clickops.demo domain controller
  microsoft.ad.domain_controller:
    dns_domain_name: "{{ ad_domain_name }}"
    domain_admin_user: "{{ ad_domain_netbios_name }}\\Administrator"
    domain_admin_password: "{{ ad_domain_admin_password }}"
    safe_mode_password: "{{ ad_safe_mode_password }}"
    install_dns: "{{ ad_install_dns }}"
    state: domain_controller
    reboot: true

- name: Wait for the replica domain controller to come back
  ansible.windows.win_reboot:
    reboot_timeout: 3600
    connect_timeout: 60
    post_reboot_delay: 30
